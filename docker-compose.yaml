services:
  # 1. Banco de Dados PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: clinicas_db
    restart: always
    environment:
      POSTGRES_USER: clinicas_user
      POSTGRES_PASSWORD: clinicas_pass
      POSTGRES_DB: Clinicas
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    # Garante que o banco está pronto para receber conexões
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicas_user -d Clinicas"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Backend (Golang)
  api:
    build: 
      context: ./API
      dockerfile: dockerfile
    container_name: clinicas_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # O host 'db' refere-se ao nome do serviço acima
      DB_DSN: host=db user=clinicas_user password=clinicas_pass dbname=Clinicas port=5432 sslmode=disable
      JWT_SECRET: sua_chave_secreta_fallback_123
      PORT: 8080
      GIN_MODE: release
      # Origens permitidas para CORS (separadas por vírgula)
      CORS_ORIGINS: http://localhost:3000
    # Inicia o binário (migrations rodam automaticamente)
    command: ["./main"]

  # 3. Frontend (Next.js)
  # Se a porta 3000 do host estiver ocupada (ex.: npm run dev), suba com:
  #   PowerShell: $env:FRONT_HOST_PORT=3001; docker compose up -d
  front:
    build:
      context: ./FRONT
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    container_name: clinicas_front
    restart: always
    depends_on:
      - api
    ports:
      - "${FRONT_HOST_PORT:-3000}:3000"

volumes:
  pgdata:
